name: Android CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Validate project structure
      run: |
        echo "验证项目结构..."
        ls -la
        if [ -f "app/build.gradle" ]; then
          echo "✅ build.gradle文件存在"
        else
          echo "❌ build.gradle文件不存在"
          exit 1
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug --stacktrace

    - name: Check APK file
      run: |
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ APK文件生成成功"
          ls -la app/build/outputs/apk/debug/
        else
          echo "❌ APK文件未生成"
          ls -la app/build/outputs/apk/debug/ || echo "目录不存在"
          exit 1
        fi

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: phonecleaner-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Generate APK download link
      run: |
        echo "✅ APK构建完成！"
        echo "📱 下载链接将在GitHub Actions页面提供"
        echo "📋 构建信息："
        echo "- 构建时间: $(date)"
        echo "- 分支: ${{ github.ref }}"
        echo "- 提交: ${{ github.sha }}"

    - name: Create release on tag
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false
        body: |
          自动构建的PhoneCleaner APK文件
          
          功能特性：
          - 实时后台程序监控
          - 内存和CPU使用率显示
          - 一键清理无用进程
          - 现代化界面设计

    - name: Upload APK to release
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: app/build/outputs/apk/debug/app-debug.apk
        asset_name: PhoneCleaner-${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive
